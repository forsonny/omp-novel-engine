name: smoke

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install package metadata
        run: bun install --no-save

      - name: Run offline smoke checks
        run: bun run smoke:offline

      - name: Start Story OS services
        run: bun run services:up

      - name: Run server smoke checks
        run: bun run smoke:server

      - name: Stop Story OS services
        if: always()
        run: bun run services:down
