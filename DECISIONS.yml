project_scope: one_engine_three_modes
modes:
  - standalone_novel
  - finite_series
  - indefinite_web_serial
package_shape: extension_plus_bundled_skills_hooks_tools_commands_rules_scripts_mcp
story_structure:
  seven_point: nested
  scopes:
    - serial_promise
    - season_or_book
    - subplot
    - major_character
    - chapter_or_episode_diagnostic
  mode: flexible_diagnostic
planning_workflow:
  - premise
  - worldbuilding
  - knowledge_graph
  - series_bible
  - plot_event_graph_main_characters_sub_characters_pov
  - beats
  - pre_prose_three_judge_audit
  - chapter
mcp: story_operating_system
storage: sqlite_graph_json_jsonl_qdrant_markdown_frontmatter
docker: omp_native_windows_mcp_qdrant_in_docker_desktop
human_in_loop: strict
chapter_variants:
  - canon-tight
  - character-heavy
  - plot-accelerated
quality_gates: all_mandatory_before_chapter_complete
outputs:
  - markdown_chapters
  - mermaid_diagrams
model_strategy:
  routing_configurable_in_config_yml: true
  extension_may_register_or_suggest_roles: true
