services:
  story-os-mcp:
    build:
      context: ./story-os-mcp
    container_name: novel-story-os-mcp
    ports:
      - "7127:7127"
    environment:
      STORY_OS_HOST: "0.0.0.0"
      STORY_OS_PORT: "7127"
      STORY_OS_WORKSPACE: "/workspace"
      STORY_OS_DB_ROOT: "/workspace/stories"
      QDRANT_URL: "http://qdrant:6333"
    volumes:
      - type: bind
        source: ..
        target: /workspace
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: novel-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
